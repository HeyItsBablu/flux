name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows (MSVC) ────────────────────────────────────────────────
          - name: Windows Debug (MSVC)
            os: windows-latest
            config: Debug
            platform: windows

          - name: Windows Release (MSVC)
            os: windows-latest
            config: Release
            platform: windows

          # ── Linux (GCC) ───────────────────────────────────────────────────
          - name: Linux Debug (GCC)
            os: ubuntu-latest
            config: Debug
            platform: linux

          - name: Linux Release (GCC)
            os: ubuntu-latest
            config: Release
            platform: linux

          # ── macOS (AppleClang) ────────────────────────────────────────────
          - name: macOS Debug (AppleClang)
            os: macos-latest
            config: Debug
            platform: macos

          - name: macOS Release (AppleClang)
            os: macos-latest
            config: Release
            platform: macos

          # ── Android (NDK) ─────────────────────────────────────────────────
          - name: Android Release (arm64-v8a)
            os: ubuntu-latest
            config: Release
            platform: android
            android_abi: arm64-v8a

          - name: Android Release (x86_64)
            os: ubuntu-latest
            config: Release
            platform: android
            android_abi: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Windows setup ───────────────────────────────────────────────────────
      - name: Set up MSVC environment
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── Linux setup ─────────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ninja-build \
            libsdl2-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libjpeg-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswscale-dev \
            libssl-dev \
            pkg-config

      # ── macOS setup ─────────────────────────────────────────────────────────
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install ninja

      # ── Android setup ───────────────────────────────────────────────────────
      - name: Set up JDK (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK and Ninja
        if: matrix.platform == 'android'
        run: |
          sudo apt-get install -y ninja-build
          echo "ANDROID_NDK_HOME=$ANDROID_NDK" >> $GITHUB_ENV

      # ── Ninja (Windows + macOS — Linux installs it above) ──────────────────
      - name: Install Ninja (Windows)
        if: matrix.platform == 'windows'
        uses: seanmiddleditch/gha-setup-ninja@v4

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure CMake (Windows)
        if: matrix.platform == 'windows'
        run: |
          cmake -S . -B build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DFLUX_BUILD_EXAMPLES=ON

      - name: Configure CMake (Linux)
        if: matrix.platform == 'linux'
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DFLUX_BUILD_EXAMPLES=ON

      - name: Configure CMake (macOS)
        if: matrix.platform == 'macos'
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DFLUX_BUILD_EXAMPLES=ON

      - name: Configure CMake (Android)
        if: matrix.platform == 'android'
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.android_abi }} \
            -DANDROID_PLATFORM=android-26 \
            -DFLUX_BUILD_EXAMPLES=OFF

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── Upload ───────────────────────────────────────────────────────────────
      - name: Upload artifacts (Release only)
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: flux-${{ matrix.platform }}-${{ matrix.android_abi || 'x64' }}-release
          path: |
            build/**/*.lib
            build/**/*.a
            build/**/*.so
            include/