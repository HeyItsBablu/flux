name: Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    name: Linux ${{ matrix.config }} (GCC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ninja-build \
            libsdl2-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libjpeg-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswscale-dev \
            libssl-dev \
            pkg-config

      - name: Configure
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DFLUX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifacts
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: flux-linux-x64-release
          path: |
            build/**/*.a
            build/**/*.so
            include/