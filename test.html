<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Nested Container</title>
</head>

<body class="bg-white min-h-screen flex items-center justify-center">

  <!-- Parent (Blue) -->
  <div class="bg-blue-500 h-[500px] w-[500px] rounded-lg">

    <!-- Child (Red) -->
    <div class="bg-red-500 h-[200px] w-[600px]  rounded-lg ">
      <p class="text-white font-bold">Red Child Container</p>
    </div>

  </div>

</body>
</html>
