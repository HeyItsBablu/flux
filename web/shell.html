<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FluxUI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* ── Canvas container ──────────────────────────────────────────────── */

        #flux-root {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /*
         * flux-gl  — WebGL2 canvas, sits BEHIND
         *            Used exclusively by CanvasWidget
         *            Renders only into CanvasWidget regions via scissor rect
         */
        #flux-gl {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* pointer-events off — all input handled by flux-ui on top */
            pointer-events: none;
        }

        /*
         * flux-ui  — Canvas 2D canvas, sits ON TOP
         *            Used for all regular widget rendering
         *            (buttons, text, containers, borders, etc.)
         */
        #flux-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* pointer-events on — this canvas receives all user input */
            pointer-events: auto;
            /* prevent default touch behaviors (scroll, zoom) */
            touch-action: none;
        }

        /* ── Loading screen ────────────────────────────────────────────────── */

        #flux-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        #flux-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .flux-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #2196f3;
            border-radius: 50%;
            animation: flux-spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes flux-spin {
            to { transform: rotate(360deg); }
        }

        .flux-loading-text {
            font-size: 13px;
            color: #888;
            letter-spacing: 0.02em;
        }

        /* ── Error screen ──────────────────────────────────────────────────── */

        #flux-error {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            z-index: 200;
            padding: 32px;
            text-align: center;
        }

        #flux-error.visible {
            display: flex;
        }

        .flux-error-title {
            font-size: 16px;
            font-weight: 500;
            color: #d32f2f;
            margin-bottom: 8px;
        }

        .flux-error-message {
            font-size: 13px;
            color: #666;
            max-width: 480px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="flux-root">
    <!-- WebGL2 layer (behind) — CanvasWidget only -->
    <canvas id="flux-gl"></canvas>

    <!-- Canvas 2D layer (front) — all regular widgets -->
    <canvas id="flux-ui"></canvas>

    <!-- Loading overlay — hidden once WASM is ready -->
    <div id="flux-loading">
        <div class="flux-spinner"></div>
        <div class="flux-loading-text">Loading...</div>
    </div>

    <!-- Error overlay — shown if WASM fails to load -->
    <div id="flux-error">
        <div class="flux-error-title">Failed to load</div>
        <div class="flux-error-message" id="flux-error-message">
            An error occurred while loading the application.
        </div>
    </div>
</div>

<script>
    // ── Canvas setup ──────────────────────────────────────────────────────────
    //
    // Both canvases are sized to physical pixels (devicePixelRatio aware).
    // CSS size stays at 100% width/height.
    // C++ side reads Module._fluxPhysicalWidth / _fluxPhysicalHeight
    // for GL viewport and layout calculations.

    const uiCanvas = document.getElementById('flux-ui');
    const glCanvas = document.getElementById('flux-gl');
    const loading  = document.getElementById('flux-loading');
    const errorDiv = document.getElementById('flux-error');
    const errorMsg = document.getElementById('flux-error-message');

    function resizeCanvases() {
        const dpr = window.devicePixelRatio || 1;
        const w   = Math.floor(window.innerWidth  * dpr);
        const h   = Math.floor(window.innerHeight * dpr);

        if (uiCanvas.width !== w || uiCanvas.height !== h) {
            uiCanvas.width  = w;
            uiCanvas.height = h;
            glCanvas.width  = w;
            glCanvas.height = h;

            // Expose to C++ via Module
            if (typeof Module !== 'undefined') {
                Module._fluxPhysicalWidth  = w;
                Module._fluxPhysicalHeight = h;
                Module._fluxDPR            = dpr;

                // Notify C++ of resize if runtime is ready
                if (Module._fluxOnResize) {
                    Module._fluxOnResize(w, h);
                }
            }
        }
    }

    // Size canvases immediately before WASM loads
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);

    // ── Canvas 2D context ─────────────────────────────────────────────────────
    //
    // Stored on Module so flux_painter_web.cpp / flux_window_web.cpp
    // can access it via EM_ASM: const ctx = Module._fluxCtx2D;

    const ctx2d = uiCanvas.getContext('2d', {
        alpha: false,           // opaque — matches your GDI+ back buffer
        desynchronized: true,   // hint for lower latency where supported
    });

    // ── WebGL2 context ────────────────────────────────────────────────────────
    //
    // Stored on Module so flux_canvas_web.cpp can reference it.
    // Emscripten also needs to find this canvas for its own GL init —
    // Module.canvas points to whichever canvas Emscripten uses for GL.

    const ctxGL = glCanvas.getContext('webgl2', {
        alpha: true,            // transparent so 2D canvas shows through
        antialias: true,
        depth: true,
        stencil: true,
        powerPreference: 'high-performance',
        preserveDrawingBuffer: false,
    });

    if (!ctxGL) {
        errorMsg.textContent =
            'WebGL2 is not supported in this browser. ' +
            'Please try Chrome 56+, Firefox 51+, or Safari 15+.';
        errorDiv.classList.add('visible');
        loading.classList.add('hidden');
    }

    // ── Emscripten Module config ───────────────────────────────────────────────

    var Module = {
        // Canvas Emscripten uses for its own WebGL context setup
        canvas: glCanvas,

        // Our Canvas 2D context — accessed by flux_painter_web.cpp
        _fluxCtx2D: ctx2d,

        // Physical pixel dimensions — read by C++ for layout and GL viewport
        _fluxPhysicalWidth:  uiCanvas.width,
        _fluxPhysicalHeight: uiCanvas.height,
        _fluxDPR:            window.devicePixelRatio || 1,

        // Resize callback — C++ sets this after init
        // flux_window_web.cpp: Module._fluxOnResize = (w, h) => { ... }
        _fluxOnResize: null,

        // ── Emscripten lifecycle hooks ────────────────────────────────────────

        onRuntimeInitialized: function() {
            // WASM loaded and C++ static initializers have run.
            // Hide loading screen — C++ main loop takes over from here.
            loading.classList.add('hidden');
        },

        // Progress during .wasm + .data download
        setStatus: function(text) {
            if (text) {
                const match = text.match(/(\d+(\.\d+)?)\/(\d+)/);
                if (match) {
                    const pct = Math.round(
                        parseInt(match[1]) / parseInt(match[3]) * 100
                    );
                    document.querySelector('.flux-loading-text').textContent =
                        'Loading... ' + pct + '%';
                }
            }
        },

        // Fatal WASM error
        onAbort: function(reason) {
            errorMsg.textContent = 'Application error: ' + reason;
            errorDiv.classList.add('visible');
            loading.classList.add('hidden');
        },

        // Unhandled exception from C++
        onExit: function(code) {
            if (code !== 0) {
                errorMsg.textContent = 'Application exited with code ' + code;
                errorDiv.classList.add('visible');
            }
        },

        // Suppress Emscripten's default print to console in release
        print: function(text) {
            console.log('[flux]', text);
        },

        printErr: function(text) {
            console.error('[flux]', text);
        },
    };

    // ── Global error handler ──────────────────────────────────────────────────

    window.addEventListener('error', function(e) {
        errorMsg.textContent = e.message || 'An unexpected error occurred.';
        errorDiv.classList.add('visible');
        loading.classList.add('hidden');
    });
</script>

<!-- Emscripten-generated JS — injected here by the build system -->
{{{ SCRIPT }}}

</body>
</html>
